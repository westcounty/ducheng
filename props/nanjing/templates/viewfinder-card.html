<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>取景框卡 — 金陵刻痕</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    .viewfinder-page {
      display: flex;
      flex-direction: column;
    }

    .vf-header {
      text-align: center;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid #8b7355;
    }

    .vf-instruction {
      font-family: 'Noto Serif SC', serif;
      font-size: 11px;
      color: #4a3020;
      letter-spacing: 0.1em;
      line-height: 1.8;
      text-align: center;
      margin-bottom: 16px;
    }

    .shapes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 20px;
      flex: 1;
    }

    .shape-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .shape-label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Noto Serif SC', serif;
      font-size: 13px;
      font-weight: 700;
      color: #1a0805;
      letter-spacing: 0.2em;
    }

    .shape-num {
      width: 22px;
      height: 22px;
      border: 1.5px solid #8b1a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #8b1a1a;
      font-weight: 700;
    }

    .shape-container {
      width: 75mm;
      height: 75mm;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .shape-note {
      font-family: 'Noto Serif SC', serif;
      font-size: 9px;
      color: #8b7355;
      letter-spacing: 0.1em;
      text-align: center;
    }

    .cut-label {
      position: absolute;
      font-family: 'Noto Serif SC', serif;
      font-size: 8px;
      color: #888;
      letter-spacing: 0.05em;
    }

    .vf-footer {
      margin-top: 16px;
      border-top: 1px solid #8b7355;
      padding-top: 10px;
    }
  </style>
</head>
<body>

<div class="page viewfinder-page">

  <div class="vf-header">
    <div class="title">取景框卡</div>
    <div class="subtitle">VIEWFINDER CARD · 金陵刻痕道具 · 沿虚线剪下镂空形状</div>
  </div>

  <div class="vf-instruction">
    用剪刀沿虚线剪下各形状，制成取景框。<br>
    将取景框对准现场碑刻/铭文，镂空区域露出的文字即为有效信息。
  </div>

  <div class="shapes-grid">

    <!-- 圆形 -->
    <div class="shape-cell">
      <div class="shape-label-row">
        <div class="shape-num">一</div>
        <span>圆框 · 秦淮水镜</span>
      </div>
      <div class="shape-container">
        <svg viewBox="0 0 220 220" width="200" height="200">
          <!-- Outer reference border -->
          <rect x="2" y="2" width="216" height="216" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
          <!-- Dashed cut circle -->
          <circle cx="110" cy="110" r="90" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
          <!-- Scissors icon at top -->
          <text x="110" y="18" text-anchor="middle" font-size="14" fill="#888">✂</text>
          <!-- Size indicator -->
          <line x1="20" y1="200" x2="200" y2="200" stroke="#8b7355" stroke-width="0.5"/>
          <text x="110" y="215" text-anchor="middle" font-size="10" fill="#8b7355">≈ 50mm 直径</text>
        </svg>
        <div class="cut-label" style="bottom:26px;right:8px;">沿虚线剪</div>
      </div>
      <div class="shape-note">用途：秦淮河倒影谜题 · 对准水面反照</div>
    </div>

    <!-- 方形 -->
    <div class="shape-cell">
      <div class="shape-label-row">
        <div class="shape-num">二</div>
        <span>方框 · 城砖取样</span>
      </div>
      <div class="shape-container">
        <svg viewBox="0 0 220 220" width="200" height="200">
          <rect x="2" y="2" width="216" height="216" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
          <!-- Dashed cut square -->
          <rect x="35" y="35" width="150" height="150" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
          <text x="35" y="28" font-size="14" fill="#888">✂</text>
          <!-- Corner marks -->
          <line x1="35" y1="35" x2="50" y2="35" stroke="#8b7355" stroke-width="1"/>
          <line x1="35" y1="35" x2="35" y2="50" stroke="#8b7355" stroke-width="1"/>
          <line x1="185" y1="35" x2="170" y2="35" stroke="#8b7355" stroke-width="1"/>
          <line x1="185" y1="35" x2="185" y2="50" stroke="#8b7355" stroke-width="1"/>
          <line x1="35" y1="185" x2="50" y2="185" stroke="#8b7355" stroke-width="1"/>
          <line x1="35" y1="185" x2="35" y2="170" stroke="#8b7355" stroke-width="1"/>
          <line x1="185" y1="185" x2="170" y2="185" stroke="#8b7355" stroke-width="1"/>
          <line x1="185" y1="185" x2="185" y2="170" stroke="#8b7355" stroke-width="1"/>
          <text x="110" y="215" text-anchor="middle" font-size="10" fill="#8b7355">≈ 50mm × 50mm</text>
        </svg>
      </div>
      <div class="shape-note">用途：城砖铭文对齐 · 覆于砖面读出文字</div>
    </div>

    <!-- 菱形 -->
    <div class="shape-cell">
      <div class="shape-label-row">
        <div class="shape-num">三</div>
        <span>菱框 · 格栅过滤</span>
      </div>
      <div class="shape-container">
        <svg viewBox="0 0 220 220" width="200" height="200">
          <rect x="2" y="2" width="216" height="216" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
          <!-- Dashed diamond cut -->
          <polygon points="110,20 200,110 110,200 20,110" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
          <text x="110" y="14" text-anchor="middle" font-size="14" fill="#888">✂</text>
          <!-- Measurement indicator -->
          <line x1="20" y1="110" x2="200" y2="110" stroke="#8b7355" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4"/>
          <text x="110" y="215" text-anchor="middle" font-size="10" fill="#8b7355">≈ 50mm 对角宽</text>
        </svg>
      </div>
      <div class="shape-note">用途：台城碑刻格栅 · 斜向对准读文</div>
    </div>

    <!-- 扇形 -->
    <div class="shape-cell">
      <div class="shape-label-row">
        <div class="shape-num">四</div>
        <span>扇框 · 鸡鸣晨曦</span>
      </div>
      <div class="shape-container">
        <svg viewBox="0 0 220 220" width="200" height="200">
          <rect x="2" y="2" width="216" height="216" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
          <!-- Dashed fan/sector cut: 180° arc -->
          <path d="M 20,170 A 90,90 0 0,1 200,170 Z" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
          <!-- Radial lines for fan -->
          <line x1="110" y1="170" x2="110" y2="80" stroke="#555" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
          <line x1="110" y1="170" x2="55" y2="110" stroke="#555" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
          <line x1="110" y1="170" x2="165" y2="110" stroke="#555" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
          <text x="200" y="165" font-size="14" fill="#888">✂</text>
          <text x="110" y="215" text-anchor="middle" font-size="10" fill="#8b7355">半圆 · 半径 ≈ 45mm</text>
        </svg>
      </div>
      <div class="shape-note">用途：鸡鸣寺莲纹取景 · 对准平台石板</div>
    </div>

  </div><!-- /shapes-grid -->

  <div class="vf-footer">
    <div class="instruction-box">
      使用方法：剪下后，将取景框对准指定位置的铭文或碑刻面，镂空区域所露出的汉字即为该站密码。每个形状对应一个站点谜题，配合验砖吏札记使用。
    </div>
  </div>

</div>

</body>
</html>
