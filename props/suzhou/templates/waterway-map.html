<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旧城水道图 — 姑苏折子</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    .map-page {
      display: flex;
      flex-direction: column;
    }

    .map-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .map-header-center {
      flex: 1;
      text-align: center;
    }

    .map-corner-seal {
      font-family: 'Noto Serif SC', serif;
      font-size: 10px;
      font-weight: 700;
      color: #C85A5A;
      border: 2px double #C85A5A;
      padding: 5px 8px;
      letter-spacing: 0.1em;
      text-align: center;
      transform: rotate(-3deg);
      opacity: 0.75;
      line-height: 1.6;
      white-space: nowrap;
    }

    .map-intro {
      font-family: 'Noto Serif SC', serif;
      font-size: 10px;
      color: #8B7E6A;
      line-height: 1.8;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      padding: 6px 10px;
      border-left: 3px solid rgba(200,90,90,0.4);
      background: rgba(200,90,90,0.04);
    }

    .map-container {
      width: 100%;
      flex: 1;
      position: relative;
    }

    .fold-hint {
      text-align: center;
      font-family: 'Noto Serif SC', serif;
      font-size: 9px;
      color: rgba(200,90,90,0.65);
      letter-spacing: 0.15em;
      margin-top: 4px;
    }

    .map-legend {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-top: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Noto Serif SC', serif;
      font-size: 9px;
      color: #3A3226;
      letter-spacing: 0.05em;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #C85A5A;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6px;
      color: #F5F0E8;
      font-weight: 700;
    }
  </style>
</head>
<body>

<div class="page map-page">

  <div class="map-header">
    <div style="width:40px;"></div>
    <div class="map-header-center">
      <div class="title">旧城水道图</div>
      <div class="subtitle">SUZHOU OLD CITY WATERWAY MAP · 姑苏折子 · 七站行程</div>
    </div>
    <div class="map-corner-seal">借<br>景</div>
  </div>

  <hr class="divider">

  <div class="map-intro">
    古城姑苏，水陆并行，河道如织。旧城四周护城河环绕，内城水巷纵横——循此图，按序寻访七站，集齐借景片段。
  </div>

  <div class="map-container">
    <svg viewBox="0 0 520 320" xmlns="http://www.w3.org/2000/svg"
         style="width:100%;height:auto;font-family:'Noto Serif SC',serif;">

      <!-- === BACKGROUND WASH === -->
      <rect x="0" y="0" width="520" height="320" fill="#EDE8DA" opacity="0.6"/>

      <!-- Light grid overlay for coordinate reference -->
      <g opacity="0.10" stroke="#3A3226" stroke-width="0.5">
        <line x1="65" y1="0" x2="65" y2="320"/>
        <line x1="130" y1="0" x2="130" y2="320"/>
        <line x1="195" y1="0" x2="195" y2="320"/>
        <line x1="260" y1="0" x2="260" y2="320"/>
        <line x1="325" y1="0" x2="325" y2="320"/>
        <line x1="390" y1="0" x2="390" y2="320"/>
        <line x1="455" y1="0" x2="455" y2="320"/>
        <line x1="0" y1="40" x2="520" y2="40"/>
        <line x1="0" y1="80" x2="520" y2="80"/>
        <line x1="0" y1="120" x2="520" y2="120"/>
        <line x1="0" y1="160" x2="520" y2="160"/>
        <line x1="0" y1="200" x2="520" y2="200"/>
        <line x1="0" y1="240" x2="520" y2="240"/>
        <line x1="0" y1="280" x2="520" y2="280"/>
      </g>

      <!-- === OUTER MOAT (护城河) — rectangular perimeter === -->
      <!-- Outer moat band — slightly wider than old city -->
      <rect x="30" y="20" width="460" height="280" rx="12"
            fill="none" stroke="#7AACCB" stroke-width="8" opacity="0.30"/>
      <rect x="30" y="20" width="460" height="280" rx="12"
            fill="none" stroke="#7AACCB" stroke-width="4" opacity="0.55"/>

      <!-- === OLD CITY RECTANGLE === -->
      <rect x="55" y="40" width="410" height="245" rx="4"
            fill="rgba(245,240,232,0.55)" stroke="#3A3226" stroke-width="1.2" opacity="0.8"/>

      <!-- === INTERNAL WATERWAYS (水巷 canals) — ink-wash style === -->
      <!-- Horizontal canals -->
      <path d="M55,100 Q160,96 260,100 Q360,104 465,100"
            fill="none" stroke="#7AACCB" stroke-width="3" opacity="0.35"/>
      <path d="M55,155 Q165,151 265,155 Q365,159 465,155"
            fill="none" stroke="#7AACCB" stroke-width="2.5" opacity="0.3"/>
      <path d="M55,210 Q160,206 260,210 Q360,214 465,210"
            fill="none" stroke="#7AACCB" stroke-width="2.5" opacity="0.3"/>
      <!-- Vertical canals -->
      <path d="M150,40 Q146,120 150,165 Q154,215 150,285"
            fill="none" stroke="#7AACCB" stroke-width="2.5" opacity="0.30"/>
      <path d="M260,40 Q256,115 260,162 Q264,215 260,285"
            fill="none" stroke="#7AACCB" stroke-width="3" opacity="0.35"/>
      <path d="M370,40 Q366,115 370,162 Q374,215 370,285"
            fill="none" stroke="#7AACCB" stroke-width="2.5" opacity="0.30"/>

      <!-- === MAJOR STREETS (major roads, lighter ink) === -->
      <g stroke="#3A3226" stroke-width="1" opacity="0.18" fill="none">
        <line x1="55" y1="130" x2="465" y2="130"/>
        <line x1="55" y1="180" x2="465" y2="180"/>
        <line x1="200" y1="40" x2="200" y2="285"/>
        <line x1="320" y1="40" x2="320" y2="285"/>
      </g>

      <!-- === ROUTE DOTTED LINE between stations === -->
      <!-- S1(100,255)→S2(220,245)→S3(340,160)→S4(400,155)→S5(390,105)→S6(120,80)→S7(80,175) -->
      <polyline
        points="100,255 220,245 340,160 400,155 390,105 120,80 80,175"
        fill="none" stroke="#C85A5A" stroke-width="1.8"
        stroke-dasharray="6,4" opacity="0.65"/>
      <!-- Arrow indicators at each segment midpoint (small chevrons) -->

      <!-- === FOLD-MIRROR DECORATIVE HALF-PATTERN at Station 1 area === -->
      <!-- Located near S1 吴门桥, left side. Center fold line marked vertically. -->
      <g transform="translate(52, 230)">
        <!-- Fold center line -->
        <line x1="24" y1="0" x2="24" y2="48" stroke="#C85A5A" stroke-width="0.8"
              stroke-dasharray="3,2" opacity="0.70"/>
        <text x="24" y="-4" text-anchor="middle" font-size="6" fill="#C85A5A" opacity="0.70">折线</text>
        <!-- Left half of symmetrical pattern (plum-flower half) -->
        <circle cx="24" cy="24" r="10" fill="none" stroke="#3A3226" stroke-width="0.8" opacity="0.55"/>
        <circle cx="24" cy="14" r="4"  fill="none" stroke="#3A3226" stroke-width="0.7" opacity="0.50"/>
        <circle cx="14" cy="20" r="4"  fill="none" stroke="#3A3226" stroke-width="0.7" opacity="0.50"/>
        <circle cx="14" cy="30" r="4"  fill="none" stroke="#3A3226" stroke-width="0.7" opacity="0.50"/>
        <circle cx="24" cy="36" r="4"  fill="none" stroke="#3A3226" stroke-width="0.7" opacity="0.50"/>
        <!-- Only left half drawn; right half is the mirror -->
        <rect x="24" y="0" width="22" height="48" fill="#EDE8DA" opacity="0.55"/>
        <!-- Right side faded hint lines -->
        <line x1="26" y1="14" x2="40" y2="14" stroke="#3A3226" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.25"/>
        <line x1="26" y1="30" x2="40" y2="30" stroke="#3A3226" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.25"/>
      </g>

      <!-- === STATION MARKERS === -->
      <!-- S1 — 盘门·吴门桥 (southwest) -->
      <g transform="translate(100,255)">
        <circle r="11" fill="#C85A5A" opacity="0.85"/>
        <circle r="14" fill="none" stroke="#C85A5A" stroke-width="1" opacity="0.4"/>
        <text text-anchor="middle" y="4" font-size="9" fill="#F5F0E8" font-weight="700">一</text>
        <text text-anchor="middle" y="26" font-size="8" fill="#3A3226" font-weight="700">盘门·吴门桥</text>
      </g>

      <!-- S2 — 苏州文庙 (south-center) -->
      <g transform="translate(220,245)">
        <circle r="11" fill="#C85A5A" opacity="0.85"/>
        <circle r="14" fill="none" stroke="#C85A5A" stroke-width="1" opacity="0.4"/>
        <text text-anchor="middle" y="4" font-size="9" fill="#F5F0E8" font-weight="700">二</text>
        <text text-anchor="middle" y="26" font-size="8" fill="#3A3226" font-weight="700">苏州文庙</text>
      </g>

      <!-- S3 — 双塔 (center-east) -->
      <g transform="translate(340,160)">
        <circle r="11" fill="#C85A5A" opacity="0.85"/>
        <circle r="14" fill="none" stroke="#C85A5A" stroke-width="1" opacity="0.4"/>
        <text text-anchor="middle" y="4" font-size="9" fill="#F5F0E8" font-weight="700">三</text>
        <text text-anchor="middle" y="26" font-size="8" fill="#3A3226" font-weight="700">双塔</text>
      </g>

      <!-- S4 — 耦园 (east) -->
      <g transform="translate(400,155)">
        <circle r="11" fill="#C85A5A" opacity="0.85"/>
        <circle r="14" fill="none" stroke="#C85A5A" stroke-width="1" opacity="0.4"/>
        <text text-anchor="middle" y="4" font-size="9" fill="#F5F0E8" font-weight="700">四</text>
        <text x="16" text-anchor="start" y="4" font-size="8" fill="#3A3226" font-weight="700">耦园</text>
      </g>

      <!-- S5 — 平江路 (east, north of S4) -->
      <g transform="translate(390,105)">
        <circle r="11" fill="#C85A5A" opacity="0.85"/>
        <circle r="14" fill="none" stroke="#C85A5A" stroke-width="1" opacity="0.4"/>
        <text text-anchor="middle" y="4" font-size="9" fill="#F5F0E8" font-weight="700">五</text>
        <text x="16" text-anchor="start" y="4" font-size="8" fill="#3A3226" font-weight="700">平江路</text>
      </g>

      <!-- S6 — 桃花坞 (northwest) -->
      <g transform="translate(120,80)">
        <circle r="11" fill="#C85A5A" opacity="0.85"/>
        <circle r="14" fill="none" stroke="#C85A5A" stroke-width="1" opacity="0.4"/>
        <text text-anchor="middle" y="4" font-size="9" fill="#F5F0E8" font-weight="700">六</text>
        <text text-anchor="middle" y="-18" font-size="8" fill="#3A3226" font-weight="700">桃花坞</text>
      </g>

      <!-- S7 — 山塘街 (west) -->
      <g transform="translate(80,175)">
        <circle r="11" fill="#C85A5A" opacity="0.85"/>
        <circle r="14" fill="none" stroke="#C85A5A" stroke-width="1" opacity="0.4"/>
        <text text-anchor="middle" y="4" font-size="9" fill="#F5F0E8" font-weight="700">七</text>
        <text x="-16" text-anchor="end" y="4" font-size="8" fill="#3A3226" font-weight="700">山塘街</text>
      </g>

      <!-- === DIRECTION LABEL === -->
      <text x="505" y="310" text-anchor="end" font-size="8" fill="#8B7E6A" opacity="0.7">北 ↑</text>
      <text x="505" y="320" text-anchor="end" font-size="7" fill="#8B7E6A" opacity="0.5">（示意，非精确比例）</text>

      <!-- === DECORATIVE WATER LABEL === -->
      <text x="28" y="168" text-anchor="middle" font-size="8" fill="#7AACCB" opacity="0.6"
            transform="rotate(-90, 28, 168)">护城河</text>
      <text x="492" y="168" text-anchor="middle" font-size="8" fill="#7AACCB" opacity="0.6"
            transform="rotate(90, 492, 168)">护城河</text>

      <!-- === INK WASH TONE AREAS (subtle) === -->
      <ellipse cx="260" cy="162" rx="180" ry="100"
               fill="rgba(58,50,38,0.025)" stroke="none"/>

    </svg>
  </div>

  <div class="fold-hint">↑ 吴门桥处折纸谜题 — 沿虚线对折，两半图案拼合后现字</div>

  <div class="map-legend">
    <div class="legend-item">
      <div class="legend-dot">一</div>盘门·吴门桥
    </div>
    <div class="legend-item">
      <div class="legend-dot">二</div>苏州文庙
    </div>
    <div class="legend-item">
      <div class="legend-dot">三</div>双塔
    </div>
    <div class="legend-item">
      <div class="legend-dot">四</div>耦园
    </div>
    <div class="legend-item">
      <div class="legend-dot">五</div>平江路
    </div>
    <div class="legend-item">
      <div class="legend-dot">六</div>桃花坞
    </div>
    <div class="legend-item">
      <div class="legend-dot">七</div>山塘街
    </div>
    <div class="legend-item" style="color:#7AACCB;">
      <span style="font-size:11px;">〜〜</span>&nbsp;水道
    </div>
  </div>

</div><!-- /page -->

</body>
</html>
