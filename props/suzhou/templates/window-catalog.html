<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>窗谱卡 — 姑苏折子</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    /* A5 / 1/3-A4 strip format; rendered as A4 single page */
    .catalog-page {
      display: flex;
      flex-direction: column;
    }

    .catalog-instruction {
      font-family: 'Noto Serif SC', serif;
      font-size: 11px;
      color: #5A3A30;
      line-height: 1.9;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      padding: 8px 12px;
      border: 1px solid rgba(200,90,90,0.30);
      background: rgba(200,90,90,0.04);
      text-align: center;
    }

    .patterns-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      flex: 1;
    }

    .pattern-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1.5px solid rgba(200,90,90,0.30);
      background: rgba(245,240,232,0.70);
      padding: 8px 6px 6px;
      position: relative;
    }

    /* Accent top bar */
    .pattern-cell::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(200,90,90,0.30);
    }

    .pattern-frame {
      width: 38mm;
      height: 38mm;
      border: 1px solid rgba(58,50,38,0.40);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FDFBF6;
      overflow: hidden;
    }

    .pattern-frame svg {
      width: 100%;
      height: 100%;
    }

    .pattern-number {
      font-family: 'Noto Serif SC', serif;
      font-size: 10px;
      font-weight: 700;
      color: #C85A5A;
      margin-top: 5px;
      letter-spacing: 0.1em;
    }

    .pattern-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 10px;
      color: #3A3226;
      letter-spacing: 0.12em;
      margin-top: 2px;
    }

    .pattern-name-en {
      font-family: 'Noto Serif SC', serif;
      font-size: 8px;
      color: #8B7E6A;
      letter-spacing: 0.06em;
      margin-top: 1px;
    }

    .record-box {
      margin-top: 14px;
      padding: 8px 12px;
      border: 1.5px solid rgba(200,90,90,0.35);
      background: rgba(200,90,90,0.03);
    }

    .record-box-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 11px;
      font-weight: 700;
      color: #C85A5A;
      letter-spacing: 0.15em;
      margin-bottom: 6px;
    }

    .record-boxes-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .record-slot {
      width: 20mm;
      height: 10mm;
      border-bottom: 1.5px solid rgba(58,50,38,0.50);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 2px;
    }

    .record-slot-label {
      font-family: 'Noto Serif SC', serif;
      font-size: 8px;
      color: #8B7E6A;
      letter-spacing: 0.05em;
    }

    .arrow-label {
      font-family: 'Noto Serif SC', serif;
      font-size: 9px;
      color: #8B7E6A;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="page catalog-page">

  <div class="page-corner-stamp">
    <div class="stamp">窗谱<br>CATALOG</div>
  </div>

  <div class="title">窗谱卡</div>
  <div class="subtitle">LATTICE WINDOW PATTERN CATALOG · 漏窗图谱 · 姑苏折子</div>

  <hr class="divider">

  <div class="catalog-instruction">
    在耦园外墙找到这些漏窗图案，按从南到北的顺序记录编号。
  </div>

  <div class="patterns-grid">

    <!-- Pattern 1: 冰裂纹 -->
    <div class="pattern-cell">
      <div class="pattern-frame">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Ice-crack pattern: irregular fracture lines -->
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <line x1="50" y1="0"  x2="35" y2="42" stroke="#3A3226" stroke-width="1.2"/>
          <line x1="35" y1="42" x2="0"  x2="0"  stroke="#3A3226" stroke-width="1.2"/>
          <line x1="35" y1="42" x2="60" y2="68" stroke="#3A3226" stroke-width="1.2"/>
          <line x1="60" y1="68" x2="100" y2="55" stroke="#3A3226" stroke-width="1.2"/>
          <line x1="60" y1="68" x2="45" y2="100" stroke="#3A3226" stroke-width="1.2"/>
          <line x1="100" y1="20" x2="72" y2="35" stroke="#3A3226" stroke-width="1"/>
          <line x1="72" y1="35" x2="35" y2="42" stroke="#3A3226" stroke-width="1"/>
          <line x1="72" y1="35" x2="60" y2="68" stroke="#3A3226" stroke-width="1" opacity="0.7"/>
          <line x1="0"  y1="65" x2="35" y2="42" stroke="#3A3226" stroke-width="1" opacity="0.7"/>
          <line x1="0"  y1="85" x2="45" y2="100" stroke="#3A3226" stroke-width="1" opacity="0.7"/>
          <line x1="80" y1="100" x2="60" y2="68" stroke="#3A3226" stroke-width="1" opacity="0.7"/>
          <!-- Smaller cracks -->
          <line x1="20" y1="0"  x2="35" y2="42" stroke="#3A3226" stroke-width="0.8" opacity="0.5"/>
          <line x1="80" y1="0"  x2="72" y2="35" stroke="#3A3226" stroke-width="0.8" opacity="0.5"/>
          <line x1="100" y1="80" x2="60" y2="68" stroke="#3A3226" stroke-width="0.8" opacity="0.5"/>
        </svg>
      </div>
      <div class="pattern-number">① 一</div>
      <div class="pattern-name">冰裂纹</div>
      <div class="pattern-name-en">Ice-Crack</div>
    </div>

    <!-- Pattern 2: 六角形 -->
    <div class="pattern-cell">
      <div class="pattern-frame">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <!-- Hexagonal tiling -->
          <!-- Center hex -->
          <polygon points="50,22 68,33 68,55 50,66 32,55 32,33"
                   fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <!-- Top hex (partial) -->
          <polygon points="50,0 68,11 68,22 50,22 32,22 32,11"
                   fill="none" stroke="#3A3226" stroke-width="1"/>
          <!-- Bottom hex (partial) -->
          <polygon points="50,66 68,77 68,89 50,100 32,89 32,77"
                   fill="none" stroke="#3A3226" stroke-width="1"/>
          <!-- Left hex (partial) -->
          <polygon points="14,33 32,33 32,55 14,55 0,46 0,42"
                   fill="none" stroke="#3A3226" stroke-width="1"/>
          <!-- Right hex (partial) -->
          <polygon points="68,33 86,33 100,42 100,46 86,55 68,55"
                   fill="none" stroke="#3A3226" stroke-width="1"/>
          <!-- Top-left hex -->
          <polygon points="14,11 32,11 32,22 14,22 0,12 0,0"
                   fill="none" stroke="#3A3226" stroke-width="1" opacity="0.6"/>
          <!-- Center dot -->
          <circle cx="50" cy="44" r="3" fill="none" stroke="#3A3226" stroke-width="1"/>
        </svg>
      </div>
      <div class="pattern-number">② 二</div>
      <div class="pattern-name">六角形</div>
      <div class="pattern-name-en">Hexagonal</div>
    </div>

    <!-- Pattern 3: 梅花 -->
    <div class="pattern-cell">
      <div class="pattern-frame">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <!-- Plum blossom: 5 petals -->
          <circle cx="50" cy="26" r="14" fill="none" stroke="#3A3226" stroke-width="1.3"/>
          <circle cx="79" cy="44" r="14" fill="none" stroke="#3A3226" stroke-width="1.3"/>
          <circle cx="69" cy="76" r="14" fill="none" stroke="#3A3226" stroke-width="1.3"/>
          <circle cx="31" cy="76" r="14" fill="none" stroke="#3A3226" stroke-width="1.3"/>
          <circle cx="21" cy="44" r="14" fill="none" stroke="#3A3226" stroke-width="1.3"/>
          <!-- Center -->
          <circle cx="50" cy="53" r="10" fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <circle cx="50" cy="53" r="3"  fill="#3A3226" opacity="0.75"/>
          <!-- Stamens (lines from center) -->
          <line x1="50" y1="43" x2="50" y2="38" stroke="#3A3226" stroke-width="0.8"/>
          <line x1="57" y1="47" x2="60" y2="43" stroke="#3A3226" stroke-width="0.8"/>
          <line x1="57" y1="59" x2="60" y2="63" stroke="#3A3226" stroke-width="0.8"/>
          <line x1="43" y1="59" x2="40" y2="63" stroke="#3A3226" stroke-width="0.8"/>
          <line x1="43" y1="47" x2="40" y2="43" stroke="#3A3226" stroke-width="0.8"/>
          <!-- Corner plum buds -->
          <circle cx="10" cy="10" r="6" fill="none" stroke="#3A3226" stroke-width="1" opacity="0.6"/>
          <circle cx="90" cy="10" r="6" fill="none" stroke="#3A3226" stroke-width="1" opacity="0.6"/>
          <circle cx="10" cy="90" r="6" fill="none" stroke="#3A3226" stroke-width="1" opacity="0.6"/>
          <circle cx="90" cy="90" r="6" fill="none" stroke="#3A3226" stroke-width="1" opacity="0.6"/>
        </svg>
      </div>
      <div class="pattern-number">③ 三</div>
      <div class="pattern-name">梅花</div>
      <div class="pattern-name-en">Plum Blossom</div>
    </div>

    <!-- Pattern 4: 如意纹 -->
    <div class="pattern-cell">
      <div class="pattern-frame">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <!-- Ruyi / auspicious cloud scroll pattern -->
          <!-- Top ruyi head -->
          <path d="M50,10 Q62,10 65,22 Q68,34 55,38 Q50,40 45,38 Q32,34 35,22 Q38,10 50,10 Z"
                fill="none" stroke="#3A3226" stroke-width="1.3"/>
          <!-- Scroll left -->
          <path d="M35,22 Q20,18 15,30 Q10,42 22,46 Q34,50 38,40"
                fill="none" stroke="#3A3226" stroke-width="1.1"/>
          <!-- Scroll right -->
          <path d="M65,22 Q80,18 85,30 Q90,42 78,46 Q66,50 62,40"
                fill="none" stroke="#3A3226" stroke-width="1.1"/>
          <!-- Handle going down -->
          <path d="M50,40 Q50,60 50,70" fill="none" stroke="#3A3226" stroke-width="1.3"/>
          <!-- Bottom cloud -->
          <path d="M38,70 Q38,58 50,58 Q62,58 62,70 Q62,82 50,85 Q38,82 38,70 Z"
                fill="none" stroke="#3A3226" stroke-width="1.1"/>
          <!-- Inner ring -->
          <circle cx="50" cy="72" r="7" fill="none" stroke="#3A3226" stroke-width="0.8" opacity="0.6"/>
          <!-- Corner scrolls -->
          <path d="M5,5 Q14,5 14,14 Q14,23 5,23" fill="none" stroke="#3A3226" stroke-width="0.9" opacity="0.55"/>
          <path d="M95,5 Q86,5 86,14 Q86,23 95,23" fill="none" stroke="#3A3226" stroke-width="0.9" opacity="0.55"/>
          <path d="M5,95 Q14,95 14,86 Q14,77 5,77" fill="none" stroke="#3A3226" stroke-width="0.9" opacity="0.55"/>
          <path d="M95,95 Q86,95 86,86 Q86,77 95,77" fill="none" stroke="#3A3226" stroke-width="0.9" opacity="0.55"/>
        </svg>
      </div>
      <div class="pattern-number">④ 四</div>
      <div class="pattern-name">如意纹</div>
      <div class="pattern-name-en">Ruyi Cloud</div>
    </div>

    <!-- Pattern 5: 万字纹 -->
    <div class="pattern-cell">
      <div class="pattern-frame">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <!-- Wan (卍) interlocking pattern — traditional Chinese auspicious symbol -->
          <!-- Repeat of wan units in grid -->
          <!-- Unit at center (50,50) -->
          <path d="M40,40 L60,40 L60,45 L45,45 L45,55 L60,55 L60,60 L40,60 L40,55 L55,55 L55,45 L40,45 Z"
                fill="#3A3226" opacity="0.80"/>
          <!-- Connecting lines to form interlocking grid -->
          <!-- Top unit -->
          <path d="M40,10 L60,10 L60,15 L45,15 L45,25 L60,25 L60,30 L40,30 L40,25 L55,25 L55,15 L40,15 Z"
                fill="#3A3226" opacity="0.40"/>
          <!-- Bottom unit -->
          <path d="M40,70 L60,70 L60,75 L45,75 L45,85 L60,85 L60,90 L40,90 L40,85 L55,85 L55,75 L40,75 Z"
                fill="#3A3226" opacity="0.40"/>
          <!-- Left unit -->
          <path d="M10,40 L30,40 L30,45 L15,45 L15,55 L30,55 L30,60 L10,60 L10,55 L25,55 L25,45 L10,45 Z"
                fill="#3A3226" opacity="0.40"/>
          <!-- Right unit -->
          <path d="M70,40 L90,40 L90,45 L75,45 L75,55 L90,55 L90,60 L70,60 L70,55 L85,55 L85,45 L70,45 Z"
                fill="#3A3226" opacity="0.40"/>
          <!-- Linking lines -->
          <line x1="50" y1="30" x2="50" y2="40" stroke="#3A3226" stroke-width="2" opacity="0.40"/>
          <line x1="50" y1="60" x2="50" y2="70" stroke="#3A3226" stroke-width="2" opacity="0.40"/>
          <line x1="30" y1="50" x2="40" y2="50" stroke="#3A3226" stroke-width="2" opacity="0.40"/>
          <line x1="60" y1="50" x2="70" y2="50" stroke="#3A3226" stroke-width="2" opacity="0.40"/>
        </svg>
      </div>
      <div class="pattern-number">⑤ 五</div>
      <div class="pattern-name">万字纹</div>
      <div class="pattern-name-en">Wan Pattern</div>
    </div>

    <!-- Pattern 6: 海棠花 -->
    <div class="pattern-cell">
      <div class="pattern-frame">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <!-- Begonia: 4-petal cross shape -->
          <ellipse cx="50" cy="28" rx="14" ry="22" fill="none" stroke="#3A3226" stroke-width="1.3"/>
          <ellipse cx="50" cy="72" rx="14" ry="22" fill="none" stroke="#3A3226" stroke-width="1.3"/>
          <ellipse cx="28" cy="50" rx="22" ry="14" fill="none" stroke="#3A3226" stroke-width="1.3"/>
          <ellipse cx="72" cy="50" rx="22" ry="14" fill="none" stroke="#3A3226" stroke-width="1.3"/>
          <!-- Center decorative circle -->
          <circle cx="50" cy="50" r="12" fill="none" stroke="#3A3226" stroke-width="1.2"/>
          <circle cx="50" cy="50" r="5"  fill="none" stroke="#3A3226" stroke-width="1"/>
          <circle cx="50" cy="50" r="2"  fill="#3A3226" opacity="0.8"/>
          <!-- Diagonal accent lines -->
          <line x1="38" y1="38" x2="62" y2="62" stroke="#3A3226" stroke-width="0.7" opacity="0.35"/>
          <line x1="62" y1="38" x2="38" y2="62" stroke="#3A3226" stroke-width="0.7" opacity="0.35"/>
          <!-- Corner dots -->
          <circle cx="10" cy="10" r="2.5" fill="#3A3226" opacity="0.55"/>
          <circle cx="90" cy="10" r="2.5" fill="#3A3226" opacity="0.55"/>
          <circle cx="10" cy="90" r="2.5" fill="#3A3226" opacity="0.55"/>
          <circle cx="90" cy="90" r="2.5" fill="#3A3226" opacity="0.55"/>
        </svg>
      </div>
      <div class="pattern-number">⑥ 六</div>
      <div class="pattern-name">海棠花</div>
      <div class="pattern-name-en">Begonia</div>
    </div>

    <!-- Pattern 7: 书卷 -->
    <div class="pattern-cell">
      <div class="pattern-frame">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <!-- Book scroll / 书卷 shape -->
          <!-- Main scroll body -->
          <rect x="15" y="25" width="70" height="50" rx="3"
                fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <!-- Left roller -->
          <ellipse cx="15" cy="50" rx="6" ry="25"
                   fill="none" stroke="#3A3226" stroke-width="1.2"/>
          <!-- Right roller -->
          <ellipse cx="85" cy="50" rx="6" ry="25"
                   fill="none" stroke="#3A3226" stroke-width="1.2"/>
          <!-- Roller center dots -->
          <circle cx="15" cy="50" r="3" fill="none" stroke="#3A3226" stroke-width="0.8"/>
          <circle cx="85" cy="50" r="3" fill="none" stroke="#3A3226" stroke-width="0.8"/>
          <!-- Text lines on scroll -->
          <line x1="25" y1="37" x2="75" y2="37" stroke="#3A3226" stroke-width="0.8" opacity="0.6"/>
          <line x1="25" y1="44" x2="75" y2="44" stroke="#3A3226" stroke-width="0.8" opacity="0.6"/>
          <line x1="25" y1="51" x2="75" y2="51" stroke="#3A3226" stroke-width="0.8" opacity="0.6"/>
          <line x1="25" y1="58" x2="75" y2="58" stroke="#3A3226" stroke-width="0.8" opacity="0.6"/>
          <line x1="25" y1="65" x2="75" y2="65" stroke="#3A3226" stroke-width="0.8" opacity="0.6"/>
          <!-- Decorative ribbon above and below -->
          <path d="M30,25 Q50,14 70,25" fill="none" stroke="#3A3226" stroke-width="0.9" opacity="0.5"/>
          <path d="M30,75 Q50,86 70,75" fill="none" stroke="#3A3226" stroke-width="0.9" opacity="0.5"/>
          <!-- Corner detail -->
          <circle cx="15" cy="28" r="2" fill="none" stroke="#3A3226" stroke-width="0.8" opacity="0.6"/>
          <circle cx="85" cy="28" r="2" fill="none" stroke="#3A3226" stroke-width="0.8" opacity="0.6"/>
          <circle cx="15" cy="72" r="2" fill="none" stroke="#3A3226" stroke-width="0.8" opacity="0.6"/>
          <circle cx="85" cy="72" r="2" fill="none" stroke="#3A3226" stroke-width="0.8" opacity="0.6"/>
        </svg>
      </div>
      <div class="pattern-number">⑦ 七</div>
      <div class="pattern-name">书卷</div>
      <div class="pattern-name-en">Book Scroll</div>
    </div>

    <!-- Pattern 8: 花瓶 -->
    <div class="pattern-cell">
      <div class="pattern-frame">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <!-- Vase / 花瓶 silhouette -->
          <!-- Vase outline -->
          <path d="M42,8 Q50,6 58,8 L62,20 Q72,25 74,38 Q76,52 70,62 Q80,68 82,80 L82,88 Q82,94 50,94 Q18,94 18,88 L18,80 Q20,68 30,62 Q24,52 26,38 Q28,25 38,20 Z"
                fill="none" stroke="#3A3226" stroke-width="1.5"/>
          <!-- Mouth rim -->
          <ellipse cx="50" cy="8" rx="8" ry="3"
                   fill="none" stroke="#3A3226" stroke-width="1.2"/>
          <!-- Neck band -->
          <path d="M38,20 Q50,18 62,20" fill="none" stroke="#3A3226" stroke-width="0.9"/>
          <!-- Shoulder band -->
          <path d="M26,38 Q50,32 74,38" fill="none" stroke="#3A3226" stroke-width="0.9"/>
          <!-- Belly horizontal band -->
          <path d="M24,55 Q50,50 76,55" fill="none" stroke="#3A3226" stroke-width="0.9"/>
          <!-- Waist narrow detail -->
          <path d="M30,63 Q50,59 70,63" fill="none" stroke="#3A3226" stroke-width="0.9"/>
          <!-- Base band -->
          <path d="M18,85 Q50,82 82,85" fill="none" stroke="#3A3226" stroke-width="0.9"/>
          <!-- Decorative diamond on belly -->
          <polygon points="50,42 56,50 50,58 44,50"
                   fill="none" stroke="#3A3226" stroke-width="0.9" opacity="0.7"/>
          <!-- Center dot -->
          <circle cx="50" cy="50" r="2" fill="#3A3226" opacity="0.75"/>
        </svg>
      </div>
      <div class="pattern-number">⑧ 八</div>
      <div class="pattern-name">花瓶</div>
      <div class="pattern-name-en">Vase</div>
    </div>

  </div><!-- /patterns-grid -->

  <div class="record-box">
    <div class="record-box-title">记录顺序 · 由南到北</div>
    <div class="record-boxes-row">
      <span class="arrow-label">南 →</span>
      <div class="record-slot"><span class="record-slot-label">第一</span></div>
      <div class="record-slot"><span class="record-slot-label">第二</span></div>
      <div class="record-slot"><span class="record-slot-label">第三</span></div>
      <div class="record-slot"><span class="record-slot-label">第四</span></div>
      <span class="arrow-label">→ 北</span>
    </div>
  </div>

  <div class="instruction-box" style="margin-top:10px;font-size:10px;">
    将四个漏窗编号按由南至北顺序填入上方空格，编号对应各图案序号①—⑧。
  </div>

</div><!-- /page -->

</body>
</html>
