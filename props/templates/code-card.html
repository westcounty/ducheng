<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暗号卡（半透明）— 第七封密电（V3新增）</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    .code-card-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .page-header {
      width: 100%;
      text-align: center;
      padding-bottom: 8px;
      border-bottom: 2px solid #8b6540;
      margin-bottom: 14px;
    }

    .code-card {
      width: 80mm;
      height: 55mm;
      border: 2px solid #8b6540;
      background: rgba(240, 232, 208, 0.5);
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .code-card-label {
      position: absolute;
      top: 6px;
      left: 8px;
      font-family: 'Noto Serif SC', serif;
      font-size: 8px;
      color: #6b4c2a;
      letter-spacing: 0.15em;
    }

    .code-card-number {
      position: absolute;
      top: 6px;
      right: 8px;
      font-family: 'Noto Serif SC', serif;
      font-size: 8px;
      color: #6b4c2a;
    }

    /* Placeholder for the arc pattern — needs field design */
    .arc-pattern-placeholder {
      width: 60mm;
      height: 35mm;
      border: 2px dashed #a08060;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif SC', serif;
      font-size: 11px;
      color: #8b6540;
      text-align: center;
      line-height: 1.6;
    }

    .print-instructions {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: 1px dashed #a08060;
      font-family: 'Noto Serif SC', serif;
      font-size: 11px;
      color: #6b4c2a;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="page code-card-page">

  <div class="page-header">
    <div class="title-zh" style="font-size:16px;letter-spacing:0.3em;">暗号卡 · 5号信封</div>
    <div class="subtitle" style="font-size:10px;margin-top:4px;">Code Card — Stage 5 Prop (Translucent)</div>
  </div>

  <!-- 暗号卡正面 -->
  <div class="code-card">
    <div class="code-card-label">暗号卡</div>
    <div class="code-card-number">5号信封</div>
    <div class="arc-pattern-placeholder">
      __FIELD__<br>
      踩线后设计弧线图案<br>
      需与盾形涡卷拼合出文字/符号
    </div>
  </div>

  <div class="print-instructions">
    <strong>制作说明：</strong><br>
    1. <strong>材质：</strong>用透明/半透明胶片（OHP投影片）或描图纸打印。普通纸不行——需要能透过卡片看到下面的建筑装饰。<br>
    2. <strong>图案设计：</strong>踩线时拍下站5盾形装饰的涡卷花纹，然后设计半幅弧线图案，使卡片弧线 + 实物涡卷 = 一个完整的字/箭头/符号。<br>
    3. <strong>尺寸：</strong>80mm × 55mm，与盾形装饰实际尺寸匹配。踩线时需测量盾形装饰大小。<br>
    4. <strong>装入5号信封。</strong>
  </div>

</div>

</body>
</html>
