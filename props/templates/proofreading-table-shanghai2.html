<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校对符号密码表 — 墨迹（上海第二剧本）</title>
  <!-- 书桌照片中的书本数量决定起始位置，需要与退稿信配合设计 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=ZCOOL+XiaoWei&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @page { size: A6 portrait; margin: 10mm; }

    html, body {
      font-family: 'Noto Serif SC', 'SimSun', serif;
      font-size: 13px;
      line-height: 1.6;
      color: #1a1a2e;
      background: #e8e4dc;
    }

    .page {
      width: 105mm;
      min-height: 140mm;
      margin: 0 auto 20px;
      padding: 12mm 14mm;
      position: relative;
      page-break-after: always;
      break-after: page;
      background-color: #f5f2eb;
      background-image:
        repeating-linear-gradient(
          transparent,
          transparent calc(1.6em * 1.6 - 1px),
          rgba(44, 62, 122, 0.08) calc(1.6em * 1.6 - 1px),
          rgba(44, 62, 122, 0.08) calc(1.6em * 1.6)
        );
      border: 1px solid rgba(44, 62, 122, 0.15);
      box-shadow:
        inset 0 0 20px rgba(44, 62, 122, 0.03),
        1px 2px 6px rgba(0, 0, 0, 0.08);
    }

    .page-label {
      font-size: 9px;
      color: #5a6a9a;
      letter-spacing: 0.15em;
      text-align: right;
      margin-bottom: 8px;
    }

    .table-title {
      font-family: 'ZCOOL XiaoWei', 'KaiTi', cursive;
      font-size: 16px;
      font-weight: 400;
      color: #2c3e7a;
      text-align: center;
      letter-spacing: 0.3em;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2c3e7a;
    }

    .cipher-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }

    .cipher-table th,
    .cipher-table td {
      border: 1px solid rgba(44, 62, 122, 0.25);
      padding: 6px 8px;
      text-align: center;
      vertical-align: middle;
    }

    .cipher-table th {
      background: rgba(44, 62, 122, 0.08);
      font-size: 11px;
      font-weight: 600;
      color: #2c3e7a;
      letter-spacing: 0.1em;
    }

    .cipher-table td {
      font-family: 'ZCOOL XiaoWei', 'KaiTi', cursive;
      font-size: 13px;
      color: #1a1a2e;
    }

    .symbol-cell {
      font-size: 18px;
      color: #c0392b;
      font-weight: 700;
    }

    .rule-cell {
      text-align: left;
      font-size: 12px;
      line-height: 1.5;
    }

    .example-cell {
      font-size: 11px;
      color: #5a6a9a;
    }

    .bottom-note {
      font-family: 'ZCOOL XiaoWei', 'KaiTi', cursive;
      font-size: 13px;
      line-height: 1.8;
      color: #1a1a2e;
      margin-top: 16px;
      padding-top: 10px;
      border-top: 1px dashed rgba(44, 62, 122, 0.3);
    }

    .bottom-note .highlight {
      background: rgba(44, 62, 122, 0.1);
      padding: 2px 4px;
      border-radius: 2px;
    }

    .redacted {
      background: #1a1a2e;
      color: #1a1a2e;
      padding: 0 6px;
      border-radius: 2px;
      user-select: none;
    }

    .margin-doodle {
      position: absolute;
      bottom: 14mm;
      right: 14mm;
      font-family: 'ZCOOL XiaoWei', cursive;
      font-size: 9px;
      color: rgba(44, 62, 122, 0.3);
      transform: rotate(3deg);
    }

    @media print {
      html, body { background: white; }
      .page {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        margin: 0;
        box-shadow: none;
        border: none;
      }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════
     校对符号密码表 — 序章道具（笔记本内页）
     苏蕊自创的校对符号与拼音/笔画解码规则。
     起始位置由书桌照片中的书本数量决定。
     ════════════════════════════════════════════════════════ -->
<div class="page">

  <div class="page-label">笔记本 · 第██页</div>

  <div class="table-title">我 的 校 对 暗 号</div>

  <table class="cipher-table">
    <thead>
      <tr>
        <th style="width:18%;">符号</th>
        <th style="width:42%;">规则</th>
        <th style="width:40%;">举例</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="symbol-cell">○</td>
        <td class="rule-cell">取该字<strong>声母</strong></td>
        <td class="example-cell">○标在"花"上 → h</td>
      </tr>
      <tr>
        <td class="symbol-cell">△</td>
        <td class="rule-cell">取该字<strong>韵母</strong></td>
        <td class="example-cell">△标在"花"上 → ua</td>
      </tr>
      <tr>
        <td class="symbol-cell">▽</td>
        <td class="rule-cell">取该字<strong>声调数字</strong></td>
        <td class="example-cell">▽标在"花"上 → 1</td>
      </tr>
      <tr>
        <td class="symbol-cell">◇</td>
        <td class="rule-cell">取该字<strong>笔画数</strong></td>
        <td class="example-cell">◇标在"花"上 → 7</td>
      </tr>
      <tr>
        <td class="symbol-cell">☆</td>
        <td class="rule-cell">该字<strong>原样保留</strong></td>
        <td class="example-cell">☆标在"花"上 → 花</td>
      </tr>
    </tbody>
  </table>

  <div class="bottom-note">
    按老规矩，从第<span class="redacted">██</span>个标记起读——数数我书桌上那摞书。<br>
    <span style="font-size:11px; color:#5a6a9a;">（翻到夹页那张照片）</span>
  </div>

  <div class="margin-doodle">SR</div>

</div>

</body>
</html>
