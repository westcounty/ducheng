<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方格迷宫 — 第七封密电</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    .maze-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .maze-header {
      width: 100%;
      text-align: center;
      padding-bottom: 8px;
      border-bottom: 2px solid #8b6540;
      margin-bottom: 6px;
    }

    .maze-container {
      position: relative;
    }

    /* The grid table */
    .maze-table {
      border-collapse: collapse;
      border: 3px solid #4a3020;
    }

    .maze-cell {
      width: 11.5mm;
      height: 11.5mm;
      border: 1px solid rgba(74,48,32,0.45);
      text-align: center;
      vertical-align: middle;
      font-family: 'Noto Serif SC', serif;
      font-size: 11px;
      font-weight: 600;
      color: #2a1505;
      background: transparent;
      position: relative;
      cursor: default;
      /* Slightly aged paper cell bg */
      background-color: rgba(245,240,232,0.3);
    }

    /* Start cell */
    .maze-cell.start {
      background-color: rgba(139,101,64,0.25);
      border: 2px solid #8b6540;
    }

    /* Placeholder cell */
    .maze-cell.field {
      color: rgba(74,48,32,0.25);
      font-style: italic;
      font-size: 9px;
    }

    /* Blocked/wall cells (for visual variety) */
    .maze-cell.wall {
      background-color: rgba(74,48,32,0.18);
    }

    /* Row/col coordinate labels */
    .coord-label {
      font-family: 'Noto Serif SC', serif;
      font-size: 8px;
      color: #6b4c2a;
      text-align: center;
      width: 11.5mm;
    }

    .row-coord {
      font-family: 'Noto Serif SC', serif;
      font-size: 8px;
      color: #6b4c2a;
      text-align: right;
      padding-right: 3px;
      height: 11.5mm;
      vertical-align: middle;
    }

    .maze-instructions {
      width: 168mm;
    }

    .instruction-step {
      font-family: 'Noto Serif SC', serif;
      font-size: 11px;
      color: #2a1505;
      line-height: 1.9;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }

    .step-num {
      font-weight: 700;
      color: #8b6540;
      min-width: 18px;
    }
  </style>
</head>
