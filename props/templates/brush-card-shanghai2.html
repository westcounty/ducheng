<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔毫对照卡 — 墨迹（上海第二剧本）</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=ZCOOL+XiaoWei&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @page { size: A6 portrait; margin: 10mm; }

    html, body {
      font-family: 'Noto Serif SC', 'SimSun', serif;
      font-size: 13px;
      line-height: 1.6;
      color: #1a1a2e;
      background: #e8e4dc;
    }

    .card {
      width: 105mm;
      min-height: 140mm;
      margin: 0 auto 16px;
      padding: 10mm 12mm;
      background-color: #f5f2eb;
      border: 1px solid rgba(44, 62, 122, 0.15);
      box-shadow: 1px 2px 6px rgba(0, 0, 0, 0.08);
      page-break-after: always;
      break-after: page;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: #2c3e7a;
      letter-spacing: 0.25em;
      text-align: center;
      margin-bottom: 4px;
    }

    .card-subtitle {
      font-size: 10px;
      color: #5a6a9a;
      text-align: center;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(44, 62, 122, 0.15);
    }

    .card-instruction {
      font-family: 'ZCOOL XiaoWei', 'KaiTi', cursive;
      font-size: 12px;
      color: #5a6a9a;
      text-align: center;
      margin-bottom: 14px;
    }

    .brush-type {
      border: 1px solid rgba(44, 62, 122, 0.2);
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 10px;
      background: rgba(44, 62, 122, 0.02);
    }

    .brush-name {
      font-size: 16px;
      font-weight: 700;
      color: #2c3e7a;
      letter-spacing: 0.15em;
      margin-bottom: 2px;
    }

    .brush-origin {
      font-size: 11px;
      color: #5a6a9a;
      margin-bottom: 6px;
    }

    .brush-specs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
      font-size: 12px;
    }

    .spec-item {
      display: flex;
      gap: 4px;
    }

    .spec-label {
      color: #5a6a9a;
      min-width: 3em;
    }

    .spec-value {
      color: #1a1a2e;
      font-family: 'ZCOOL XiaoWei', cursive;
    }

    .su-rui-note {
      font-family: 'ZCOOL XiaoWei', 'KaiTi', cursive;
      font-size: 11px;
      color: #c0392b;
      margin-top: 4px;
      padding-left: 8px;
      border-left: 2px solid #c0392b;
    }

    .answer-box {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px dashed rgba(44, 62, 122, 0.2);
      text-align: center;
    }

    .answer-box label {
      font-size: 12px;
      color: #2c3e7a;
      letter-spacing: 0.1em;
    }

    .answer-line {
      display: inline-block;
      width: 40mm;
      border-bottom: 1px solid #2c3e7a;
      margin-left: 4px;
    }

    @media print {
      html, body { background: white; }
      .card {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        margin: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════
     笔毫对照卡 — 站4（笔墨博物馆）道具
     三种笔毫特征描述，对照展柜实物判断哪种是狼毫。
     ════════════════════════════════════════════════════════ -->
<div class="card">

  <div class="card-title">笔 毫 对 照</div>
  <div class="card-subtitle">第四站 · 笔墨博物馆 · 福州路429号</div>

  <div class="card-instruction">
    "硬的，跟我脾气一样。" ——苏蕊<br>
    对照展柜里的毛笔，找出她用的那一种。
  </div>

  <div class="brush-type">
    <div class="brush-name">狼 毫</div>
    <div class="brush-origin">材质：黄鼠狼尾毛（非狼毛）</div>
    <div class="brush-specs">
      <div class="spec-item"><span class="spec-label">色泽：</span><span class="spec-value">黄褐色，有光泽</span></div>
      <div class="spec-item"><span class="spec-label">硬度：</span><span class="spec-value">硬，弹性极强</span></div>
      <div class="spec-item"><span class="spec-label">锋颖：</span><span class="spec-value">尖锐挺拔</span></div>
      <div class="spec-item"><span class="spec-label">手感：</span><span class="spec-value">刚劲有力，回弹快</span></div>
    </div>
    <div class="su-rui-note">苏蕊批注：写退稿信专用。一笔下去不拐弯。</div>
  </div>

  <div class="brush-type">
    <div class="brush-name">羊 毫</div>
    <div class="brush-origin">材质：山羊毛</div>
    <div class="brush-specs">
      <div class="spec-item"><span class="spec-label">色泽：</span><span class="spec-value">白色或浅黄，柔和</span></div>
      <div class="spec-item"><span class="spec-label">硬度：</span><span class="spec-value">软，弹性较弱</span></div>
      <div class="spec-item"><span class="spec-label">锋颖：</span><span class="spec-value">圆润含蓄</span></div>
      <div class="spec-item"><span class="spec-label">手感：</span><span class="spec-value">绵软温厚，蓄墨多</span></div>
    </div>
    <div class="su-rui-note">苏蕊批注：写情书大概用这种。但我不写情书。</div>
  </div>

  <div class="brush-type">
    <div class="brush-name">兼 毫</div>
    <div class="brush-origin">材质：狼毫+羊毫混合</div>
    <div class="brush-specs">
      <div class="spec-item"><span class="spec-label">色泽：</span><span class="spec-value">黄白相间</span></div>
      <div class="spec-item"><span class="spec-label">硬度：</span><span class="spec-value">中等，软硬适度</span></div>
      <div class="spec-item"><span class="spec-label">锋颖：</span><span class="spec-value">介于刚柔之间</span></div>
      <div class="spec-item"><span class="spec-label">手感：</span><span class="spec-value">均衡流畅，初学适用</span></div>
    </div>
    <div class="su-rui-note">苏蕊批注：做人大概该像兼毫。但我做不到。</div>
  </div>

  <div class="answer-box">
    <label>苏蕊用的是：<span class="answer-line"></span></label>
  </div>

</div>

</body>
</html>
