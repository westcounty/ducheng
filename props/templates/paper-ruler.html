  <style>
    .ruler-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20mm 15mm;
    }

    .ruler-header {
      width: 100%;
      text-align: center;
      padding-bottom: 8px;
      border-bottom: 2px solid #8b6540;
      margin-bottom: 10px;
    }

    /* ── Ruler strip ──────────────────────────────── */
    .ruler-strip {
      width: 250mm;
      height: 30mm;
      position: relative;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Top and bottom cut lines */
    .ruler-strip::before,
    .ruler-strip::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 0;
      border-top: 1.5px dashed #666;
    }
    .ruler-strip::before { top: 0; }
    .ruler-strip::after { bottom: 0; }

    /* Scissors icons at start of cut lines */

    /* The ruler SVG body */
    .ruler-svg {
      display: block;
      width: 250mm;
      height: 30mm;
    }

    /* ── Second ruler strip (rotated/reversed) ─── */
    .ruler-note {
      font-family: 'Noto Serif SC', serif;
      font-size: 11px;
      color: #4a3020;
      text-align: center;
      letter-spacing: 0.15em;
      line-height: 1.8;
    }

    .scissors-icon {
      font-size: 14px;
      color: #666;
      position: absolute;
      top: -8px;
      left: -6px;
    }
  </style>
